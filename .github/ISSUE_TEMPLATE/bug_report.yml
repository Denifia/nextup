name: Bug report
description: Report incorrect behavior, validation issues, parsing surprises, or CLI problems
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        Please include the exact request JSON, expected result, actual result, and environment details.

  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: Short description of the problem
    validations:
      required: true

  - type: textarea
    id: request
    attributes:
      label: Request JSON
      description: Paste the exact request JSON used with nextup
      render: json
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Config JSON
      description: Paste config content if `--config` was used
      render: json

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include stdout, stderr, exit code, or other observed behavior
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node.js version, nextup version/commit, and how you ran it
    validations:
      required: true
