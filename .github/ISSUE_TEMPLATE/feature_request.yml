name: Feature request
description: Suggest an improvement or new capability
labels:
  - enhancement
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: Short statement of the requested improvement
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: additional
    attributes:
      label: Additional context
