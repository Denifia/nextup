name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Validate tag matches package version
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_NAME="${GITHUB_REF_NAME}"
          if [ "${TAG_NAME}" != "v${PACKAGE_VERSION}" ]; then
            echo "Tag ${TAG_NAME} does not match package.json version v${PACKAGE_VERSION}" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run release checks
        run: npm run release:check

      - name: Pack npm artifact
        run: npm pack --json > npm-pack.json

      - name: Render release notes from changelog
        run: npm run release:notes

      - name: Generate checksums
        shell: bash
        run: |
          PACKAGE_FILE=$(node -p "require('./npm-pack.json')[0].filename")
          sha256sum "${PACKAGE_FILE}" > SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tgz
            npm-pack.json
            SHA256SUMS.txt
          body_path: RELEASE_NOTES.md

      - name: Publish to npm
        if: ${{ env.NPM_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
        run: npm publish --provenance --access public
