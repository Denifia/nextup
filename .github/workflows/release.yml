name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Setup npm
        run: npm install -g npm@11.10.1

      - name: Read package metadata
        id: package
        shell: bash
        run: |
          echo "name=$(node -p 'require("./package.json").name')" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches package version
        shell: bash
        run: |
          PACKAGE_VERSION="${{ steps.package.outputs.version }}"
          TAG_NAME="${GITHUB_REF_NAME}"
          if [ "${TAG_NAME}" != "v${PACKAGE_VERSION}" ]; then
            echo "Tag ${TAG_NAME} does not match package.json version v${PACKAGE_VERSION}" >&2
            exit 1
          fi

      - name: Check whether version already exists on npm
        id: npm_version
        shell: bash
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version already exists on npm; publish step will be skipped."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Run release checks
        run: npm run release:check

      - name: Pack npm artifact
        run: npm pack --json > npm-pack.json

      - name: Render release notes from changelog
        run: npm run release:notes

      - name: Generate checksums
        shell: bash
        run: |
          PACKAGE_FILE=$(node -p "require('./npm-pack.json')[0].filename")
          sha256sum "${PACKAGE_FILE}" > SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            *.tgz
            npm-pack.json
            SHA256SUMS.txt
          body_path: RELEASE_NOTES.md

      - name: Publish to npm via trusted publishing
        if: ${{ steps.npm_version.outputs.exists != 'true' }}
        run: npm publish --provenance --access public

      - name: Note skipped npm publish
        if: ${{ steps.npm_version.outputs.exists == 'true' }}
        shell: bash
        run: echo "Skipping npm publish because ${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} already exists."
